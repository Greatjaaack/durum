<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Durum Dashboard{% endblock %}</title>
  <meta http-equiv="refresh" content="60" />
  <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}" />
  <script src="{{ url_for('static', path='chart.umd.min.js') }}" defer></script>
  <script src="{{ url_for('static', path='dashboard.js') }}" defer></script>
</head>
<body>
  <header class="topbar">
    <div class="topbar__row">
      <div class="topbar__brand">
        <img src="/static/logo.png" alt="Iskendy" class="topbar__logo" onerror="this.style.display='none'" />
      </div>
      {% if active_shift %}
      <div class="shift-active-badge">
        <span class="shift-active-dot"></span>
        Смена открыта — {{ active_shift.employee }}{% if active_shift.open_time %} с {{ active_shift.open_time }}{% endif %}
      </div>
      {% endif %}
      <a href="/logout" class="logout-btn">Выйти</a>
    </div>
    {% if subtitle %}<div class="topbar__subtitle">{{ subtitle }}</div>{% endif %}
  </header>
  <nav class="tab-nav">
    <a href="/dashboard" class="tab-nav__link {% if active_tab == 'dashboard' %}is-active{% endif %}">📊 Операции</a>
    <a href="/dashboard/employees" class="tab-nav__link {% if active_tab == 'employees' %}is-active{% endif %}">👥 Сотрудники</a>
  </nav>
  <main class="layout">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
