<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Вход · Iskender Dashboard</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body class="login-body">
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">
        <img src="/static/logo.png" alt="Iskender" class="login-logo__img" onerror="this.style.display='none'" />
        <span class="login-logo__text">Iskender</span>
      </div>
      <p class="login-subtitle">Панель управления</p>
      {% if error %}
      <div class="login-error">{{ error }}</div>
      {% endif %}
      <form method="post" action="/login" class="login-form">
        <label class="field">
          <span>Логин</span>
          <input type="text" name="username" autocomplete="username" autofocus required />
        </label>
        <label class="field">
          <span>Пароль</span>
          <input type="password" name="password" autocomplete="current-password" required />
        </label>
        <button type="submit" class="login-btn">Войти</button>
      </form>
    </div>
  </div>
</body>
</html>
