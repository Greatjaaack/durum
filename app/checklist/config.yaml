close_residual_inputs:
  "Зафиксировать остаток маринованной курицы":
    key: "marinated_chicken"
    prompt: "Введите остаток маринованной курицы (г)"
    unit: "г"
    stock_item: "мясо"
    unit_type: "weight_g"
    max_value: 50000
    only_integer: true
    step: 1
  "Зафиксировать остаток жареной курицы":
    key: "fried_chicken"
    prompt: "Введите остаток жареной курицы (г)"
    unit: "г"
    stock_item: null
    unit_type: "weight_g"
    max_value: 50000
    only_integer: true
    step: 1
  "Зафиксировать остаток лаваша":
    key: "lavash"
    prompt: "Введите количество оставшегося лаваша (шт)"
    unit: "шт"
    stock_item: "лаваш"
    unit_type: "piece"
    max_value: 2000
    only_integer: true
    step: 1
  "Зафиксировать остаток жареного лаваша":
    key: "fried_lavash"
    prompt: "Введите количество оставшегося жареного лаваша (шт)"
    unit: "шт"
    stock_item: null
    unit_type: "piece"
    max_value: 2000
    only_integer: true
    step: 1
  "Зафиксировать остаток супа":
    key: "soup"
    prompt: "Введите остаток супа (г)"
    unit: "г"
    stock_item: null
    unit_type: "weight_g"
    max_value: 50000
    only_integer: true
    step: 1
  "Зафиксировать остаток соуса":
    key: "sauce"
    prompt: "Выберите остаток соуса кнопкой или введите вручную"
    unit: "гастроёмк"
    stock_item: null
    unit_type: "gastro_unit"
    max_value: 100
    only_integer: false
    step: 0.5
    quick_buttons:
      - label: "0"
        value: "0"
      - label: "1/2"
        value: "1/2"
      - label: "1"
        value: "1"
      - label: "1+1/2"
        value: "1+1/2"
