close_residual_inputs:
  "Маринованная грудка":
    key: "marinated_chicken"
    checklist_item: "Маринованная курица"
    prompt: "Введите остаток маринованной курицы (г)"
    unit: "г"
    stock_item: "мясо"
    unit_type: "weight_g"
    max_value: 20_000
    only_integer: true
    step: 1
  "Жареная грудка":
    key: "fried_chicken"
    checklist_item: "Готовая курица"
    prompt: "Введите остаток жареной курицы (г)"
    unit: "г"
    stock_item: null
    unit_type: "weight_g"
    max_value: 10_000
    only_integer: true
    step: 1
  "Лаваш":
    key: "lavash"
    checklist_item: "Лаваш"
    prompt: "Введите количество оставшегося лаваша (шт)"
    unit: "шт"
    stock_item: "лаваш"
    unit_type: "piece"
    max_value: 200
    only_integer: true
    step: 1
  "Жареного лаваша":
    key: "fried_lavash"
    checklist_item: "Жареный лаваш"
    prompt: "Введите количество оставшегося жареного лаваша (шт)"
    unit: "шт"
    stock_item: null
    unit_type: "piece"
    max_value: 100
    only_integer: true
    step: 1
  "Супа":
    key: "soup"
    checklist_item: "Суп"
    prompt: "Введите остаток супа (л)"
    unit: "л"
    stock_item: null
    unit_type: "liter"
    max_value: 20
    only_integer: false
    step: 0.1
  "Соус":
    key: "sauce"
    checklist_item: "Соусы"
    prompt: "Введите остаток соуса (л)"
    unit: "л"
    stock_item: null
    unit_type: "liter"
    max_value: 20
    only_integer: false
    step: 0.1
    quick_buttons:
      - label: "0 л"
        value: "0"
      - label: "0.5 л"
        value: "0.5"
      - label: "1 л"
        value: "1"
      - label: "2 л"
        value: "2"

mid_numeric_inputs:
  "Готовая курица":
