services:
  bot:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_PATH: /data/shifts.db
      MEDIA_DIR: /data/media
      LOG_DIR: /app/logs
      TZ: ${BOT_TIMEZONE:-Europe/Moscow}
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  dashboard:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_PATH: /data/shifts.db
      MEDIA_DIR: /data/media
      TZ: ${BOT_TIMEZONE:-Europe/Moscow}
    command: ["python", "-m", "uvicorn", "app.dashboard:app", "--host", "0.0.0.0", "--port", "8000"]
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    ports:
      - "8000:8000"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
