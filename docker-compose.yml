services:
  bot:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_PATH: /data/shifts.db
      LOG_DIR: /app/logs
      TZ: ${BOT_TIMEZONE:-Europe/Moscow}
    volumes:
      - ./data:/data
      - ./logs:/app/logs

  dashboard:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_PATH: /data/shifts.db
      TZ: ${BOT_TIMEZONE:-Europe/Moscow}
    command: ["python", "-m", "uvicorn", "app.dashboard:app", "--host", "0.0.0.0", "--port", "8000"]
    volumes:
      - ./data:/data
    ports:
      - "8000:8000"
